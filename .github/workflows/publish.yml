name: Publish to PyPI

# Publishes on a GitHub Release using PyPI Trusted Publishing (OIDC) — no API
# token is stored anywhere. One-time setup: register this repo + workflow as a
# trusted publisher on PyPI. See docs/RELEASING.md.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      # Third-party actions pinned to a full commit SHA (supply-chain hardening);
      # the trailing comment records the human-readable version.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Build sdist + wheel
        run: uv build

      - name: Verify the tag matches the package version
        run: |
          PKG=$(uv run python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          echo "package=$PKG tag=$TAG"
          test "$PKG" = "$TAG" || { echo "::error::tag $TAG != package version $PKG"; exit 1; }

      - name: Publish to PyPI (Trusted Publishing, no token)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
